services:
  app:
    build: .
    container_name: mychampsbot-js-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-2000}:${DASHBOARD_PORT:-2000}"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_OAUTH_CLIENT_ID: ${DISCORD_OAUTH_CLIENT_ID:-}
      DISCORD_OAUTH_CLIENT_SECRET: ${DISCORD_OAUTH_CLIENT_SECRET}
      DATABASE_URL: mysql://discord:discord@db:3306/discord
      DASHBOARD_PORT: ${DASHBOARD_PORT:-2000}
      DASHBOARD_BASE_PATH: ${DASHBOARD_BASE_PATH:-/bot}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-https://mychamps.gg/bot}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET}
      VIRTUAL_HOST: ${DASHBOARD_VIRTUAL_HOST:-mychamps.gg}
      VIRTUAL_PATH: ${DASHBOARD_VIRTUAL_PATH:-/bot}
      VIRTUAL_PORT: ${DASHBOARD_PORT:-2000}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST:-mychamps.gg}
      DISCORD_BOT_PERMISSIONS: ${DISCORD_BOT_PERMISSIONS:-268520528}
    networks:
      - app-network
      - nginx-proxy

  db:
    image: mysql:8.4
    container_name: mychampsbot-js-db
    restart: unless-stopped
    ports:
      - "5306:3306"
    environment:
      MYSQL_DATABASE: discord
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: discord
      MYSQL_PASSWORD: discord
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "discord", "-pdiscord"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mychampsbot-js-pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9092:80"
    environment:
      PMA_HOST: db
      PMA_USER: discord
      PMA_PASSWORD: discord
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
  nginx-proxy:
    external: true
