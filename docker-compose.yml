services:
  app:
    build: .
    container_name: mychampsbot-js-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "2000:2000"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DATABASE_URL: mysql://discord:discord@db:3306/discord
      DASHBOARD_PORT: 2000
    networks:
      - app-network

  db:
    image: mysql:8.4
    container_name: mychampsbot-js-db
    restart: unless-stopped
    ports:
      - "5306:3306"
    environment:
      MYSQL_DATABASE: discord
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: discord
      MYSQL_PASSWORD: discord
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "discord", "-pdiscord"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mychampsbot-js-pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9092:80"
    environment:
      PMA_HOST: db
      PMA_USER: discord
      PMA_PASSWORD: discord
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
