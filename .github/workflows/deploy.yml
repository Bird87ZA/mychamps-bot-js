name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy code
        run: rsync -avz -e 'ssh -o "StrictHostKeyChecking=no"' --exclude='.git/' --exclude='node_modules/' --exclude='dist/' --exclude='.env' ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/mychamps-bot-js

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/mychamps-bot-js

            docker compose build app
            docker compose up -d db
            for i in $(seq 1 30); do
              if docker compose exec -T db mysqladmin ping -h localhost -u discord -pdiscord --silent; then
                break
              fi

              if [ "$i" = "30" ]; then
                echo "Database did not become ready in time"
                exit 1
              fi

              sleep 2
            done
            docker compose run --rm --no-deps --entrypoint npx app prisma migrate deploy
            docker compose run --rm --no-deps --entrypoint npm app run deploy-commands
            docker compose up -d app
            docker compose ps app
